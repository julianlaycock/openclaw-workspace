<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caelith — 3D Concept Render</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;overflow:hidden;font-family:system-ui}
canvas{display:block;width:100vw;height:100vh}
.label{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:13px;letter-spacing:0.1em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">Move your mouse · Caelith 3D Concept</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, mx = 0.5, my = 0.5, t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => {
  mx = e.clientX / W;
  my = e.clientY / H;
});

// Color palette — Caelith brand: teal, deep blue, warm accent
const colors = {
  teal: [78, 205, 196],
  blue: [45, 80, 180],
  purple: [108, 99, 255],
  warm: [220, 160, 100],
  pink: [200, 100, 140]
};

// 3D Shield shape — represents compliance/protection
function drawShield(cx, cy, size, rotX, rotY, time) {
  const points = [];
  const segments = 64;
  
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    let x, y;
    
    if (t < 0.25) {
      // Top-left curve
      const a = t * 4;
      x = -0.5 + a * 0.5;
      y = -0.85 + Math.pow(a, 2) * 0.15;
    } else if (t < 0.5) {
      // Top-right curve
      const a = (t - 0.25) * 4;
      x = 0 + a * 0.5;
      y = -0.85 + 0.15 - Math.pow(1 - a, 2) * 0.15;
    } else if (t < 0.75) {
      // Right side tapering down
      const a = (t - 0.5) * 4;
      x = 0.5 - a * 0.3;
      y = -0.7 + a * 1.2;
    } else {
      // Bottom point + left side
      const a = (t - 0.75) * 4;
      if (a < 0.5) {
        x = 0.2 - a * 0.4;
        y = 0.5 + (0.5 - Math.abs(a - 0.25) * 4) * 0.35;
      } else {
        x = 0 - (a - 0.5) * 1.0;
        y = 0.85 - (a - 0.5) * 2 * 1.55;
      }
    }
    
    // Apply 3D rotation
    const cosY = Math.cos(rotY);
    const sinY = Math.sin(rotY);
    const cosX = Math.cos(rotX);
    const sinX = Math.sin(rotX);
    
    let x3d = x * cosY;
    let z3d = x * sinY;
    let y3d = y * cosX - z3d * sinX;
    z3d = y * sinX + z3d * cosX;
    
    const perspective = 1 / (1 - z3d * 0.3);
    
    points.push({
      x: cx + x3d * size * perspective,
      y: cy + y3d * size * perspective,
      z: z3d
    });
  }
  
  return points;
}

// Glossy gradient fill like NAP's balloon letters
function fillShape(points, time, hue) {
  if (points.length < 3) return;
  
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[Math.min(points.length - 1, i + 1)];
    const cpx = p1.x;
    const cpy = p1.y;
    ctx.lineTo(cpx, cpy);
  }
  ctx.closePath();
  
  // Metallic/glossy gradient
  const centerX = points.reduce((s, p) => s + p.x, 0) / points.length;
  const centerY = points.reduce((s, p) => s + p.y, 0) / points.length;
  
  const grad = ctx.createRadialGradient(
    centerX - 40 + Math.sin(time * 0.5) * 30,
    centerY - 60 + Math.cos(time * 0.3) * 20,
    10,
    centerX,
    centerY,
    280
  );
  
  const c1 = colors.teal;
  const c2 = colors.purple;
  const c3 = colors.warm;
  const c4 = colors.pink;
  
  const shift = (Math.sin(time * 0.2 + hue) + 1) / 2;
  
  grad.addColorStop(0, `rgba(${lerp(c1, c3, shift).join(',')},0.95)`);
  grad.addColorStop(0.3, `rgba(${lerp(c2, c1, shift).join(',')},0.85)`);
  grad.addColorStop(0.6, `rgba(${lerp(c4, c2, shift).join(',')},0.75)`);
  grad.addColorStop(1, `rgba(${lerp(c3, c4, shift).join(',')},0.6)`);
  
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Specular highlight
  const specGrad = ctx.createRadialGradient(
    centerX - 50 + Math.sin(time * 0.4) * 40,
    centerY - 80 + Math.cos(time * 0.5) * 30,
    5,
    centerX - 20,
    centerY - 40,
    200
  );
  specGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
  specGrad.addColorStop(0.3, 'rgba(255,255,255,0.08)');
  specGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = specGrad;
  ctx.fill();
  
  // Edge glow
  ctx.strokeStyle = `rgba(${lerp(c1, c2, shift).join(',')},0.4)`;
  ctx.lineWidth = 2;
  ctx.shadowColor = `rgba(${c1.join(',')},0.3)`;
  ctx.shadowBlur = 20;
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  ctx.restore();
}

function lerp(a, b, t) {
  return a.map((v, i) => Math.round(v + (b[i] - v) * t));
}

// Draw the checkmark inside shield
function drawCheckmark(cx, cy, size, rotX, rotY, time) {
  const cosY = Math.cos(rotY);
  const sinY = Math.sin(rotY);
  const cosX = Math.cos(rotX);
  const sinX = Math.sin(rotX);
  
  function project(x, y) {
    let x3d = x * cosY;
    let z3d = x * sinY;
    let y3d = y * cosX - z3d * sinX;
    z3d = y * sinX + z3d * cosX;
    const p = 1 / (1 - z3d * 0.3);
    return { x: cx + x3d * size * p, y: cy + y3d * size * p };
  }
  
  const p1 = project(-0.2, 0.05);
  const p2 = project(-0.05, 0.2);
  const p3 = project(0.25, -0.2);
  
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.lineTo(p3.x, p3.y);
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(78,205,196,0.6)';
  ctx.shadowBlur = 15;
  ctx.stroke();
  ctx.restore();
}

// Floating particles
const particles = Array.from({length: 60}, () => ({
  x: Math.random(),
  y: Math.random(),
  z: Math.random() * 0.5,
  size: Math.random() * 2 + 0.5,
  speed: Math.random() * 0.0003 + 0.0001,
  offset: Math.random() * Math.PI * 2
}));

function drawParticles(time) {
  particles.forEach(p => {
    const x = (p.x + Math.sin(time * p.speed * 10 + p.offset) * 0.05) * W;
    const y = (p.y + Math.cos(time * p.speed * 8 + p.offset) * 0.05) * H;
    const alpha = 0.1 + Math.sin(time * 0.02 + p.offset) * 0.05;
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(78,205,196,${alpha})`;
    ctx.fill();
  });
}

// Text "CAELITH"
function drawText(time) {
  const size = Math.min(W * 0.08, 80);
  ctx.save();
  ctx.font = `800 ${size}px Sora, system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  const text = 'CAELITH';
  const textY = H * 0.82;
  
  // Gradient text
  const grad = ctx.createLinearGradient(W * 0.3, textY, W * 0.7, textY);
  const shift = (Math.sin(time * 0.3) + 1) / 2;
  grad.addColorStop(0, `rgba(${lerp(colors.teal, colors.purple, shift).join(',')},0.7)`);
  grad.addColorStop(0.5, `rgba(${lerp(colors.purple, colors.warm, shift).join(',')},0.5)`);
  grad.addColorStop(1, `rgba(${lerp(colors.warm, colors.teal, shift).join(',')},0.7)`);
  
  ctx.fillStyle = grad;
  ctx.shadowColor = `rgba(78,205,196,0.2)`;
  ctx.shadowBlur = 30;
  ctx.fillText(text, W / 2, textY);
  ctx.restore();
}

// Subtitle
function drawSubtitle(time) {
  ctx.save();
  const size = Math.min(W * 0.014, 14);
  ctx.font = `500 ${size}px Inter, system-ui`;
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,255,255,${0.25 + Math.sin(time * 0.05) * 0.05})`;
  ctx.letterSpacing = '0.2em';
  ctx.fillText('COMPLIANCE INFRASTRUCTURE FOR EU FUND MANAGERS', W / 2, H * 0.88);
  ctx.restore();
}

function animate() {
  t += 0.016;
  
  // Dark background with subtle gradient
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);
  
  // Background gradient
  const bgGrad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, W * 0.6);
  bgGrad.addColorStop(0, 'rgba(20,30,60,0.5)');
  bgGrad.addColorStop(1, 'rgba(10,14,26,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  drawParticles(t * 60);
  
  // Mouse-driven rotation (subtle)
  const targetRotY = (mx - 0.5) * 0.5;
  const targetRotX = (my - 0.5) * 0.3;
  
  // Main shield — center
  const shieldX = W / 2;
  const shieldY = H * 0.42;
  const shieldSize = Math.min(W, H) * 0.28;
  
  const rotY = targetRotY + Math.sin(t * 0.5) * 0.08;
  const rotX = targetRotX + Math.cos(t * 0.4) * 0.05;
  
  // Shadow
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(shieldX + 5, shieldY + shieldSize * 0.9, shieldSize * 0.4, shieldSize * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.filter = 'blur(20px)';
  ctx.fill();
  ctx.filter = 'none';
  ctx.restore();
  
  const shieldPoints = drawShield(shieldX, shieldY, shieldSize, rotX, rotY, t);
  fillShape(shieldPoints, t, 0);
  drawCheckmark(shieldX, shieldY, shieldSize, rotX, rotY, t);
  
  // Small floating elements — document icon (left)
  const doc1X = W * 0.22 + Math.sin(t * 0.6) * 15;
  const doc1Y = H * 0.35 + Math.cos(t * 0.5) * 20;
  drawFloatingDoc(doc1X, doc1Y, 50, t, 1);
  
  // Small floating element — lock icon (right)
  const lock1X = W * 0.78 + Math.sin(t * 0.5 + 1) * 15;
  const lock1Y = H * 0.38 + Math.cos(t * 0.6 + 1) * 18;
  drawFloatingLock(lock1X, lock1Y, 45, t, 2);
  
  // Small floating element — graph (top right)  
  const graphX = W * 0.68 + Math.sin(t * 0.4 + 2) * 12;
  const graphY = H * 0.2 + Math.cos(t * 0.55 + 2) * 15;
  drawFloatingGraph(graphX, graphY, 40, t, 3);
  
  drawText(t);
  drawSubtitle(t);
  
  requestAnimationFrame(animate);
}

function drawFloatingDoc(cx, cy, size, time, hue) {
  ctx.save();
  const bob = Math.sin(time * 0.8 + hue) * 5;
  cy += bob;
  
  // Document shape
  ctx.beginPath();
  const r = 6;
  ctx.moveTo(cx - size * 0.35 + r, cy - size * 0.45);
  ctx.lineTo(cx + size * 0.2, cy - size * 0.45);
  ctx.lineTo(cx + size * 0.35, cy - size * 0.3);
  ctx.lineTo(cx + size * 0.35, cy + size * 0.45);
  ctx.quadraticCurveTo(cx + size * 0.35, cy + size * 0.45 + r, cx + size * 0.35 - r, cy + size * 0.45 + r);
  ctx.lineTo(cx - size * 0.35 + r, cy + size * 0.45 + r);
  ctx.quadraticCurveTo(cx - size * 0.35, cy + size * 0.45 + r, cx - size * 0.35, cy + size * 0.45);
  ctx.lineTo(cx - size * 0.35, cy - size * 0.45 + r);
  ctx.quadraticCurveTo(cx - size * 0.35, cy - size * 0.45, cx - size * 0.35 + r, cy - size * 0.45);
  ctx.closePath();
  
  const grad = ctx.createLinearGradient(cx - size, cy - size, cx + size, cy + size);
  const shift = (Math.sin(time * 0.3 + hue) + 1) / 2;
  grad.addColorStop(0, `rgba(${lerp(colors.teal, colors.blue, shift).join(',')},0.7)`);
  grad.addColorStop(1, `rgba(${lerp(colors.purple, colors.teal, shift).join(',')},0.5)`);
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(78,205,196,0.3)';
  ctx.shadowBlur = 20;
  ctx.fill();
  
  // Lines on doc
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(cx - size * 0.2, cy - size * 0.15 + i * 14);
    ctx.lineTo(cx + size * 0.2 - i * 8, cy - size * 0.15 + i * 14);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  
  ctx.restore();
}

function drawFloatingLock(cx, cy, size, time, hue) {
  ctx.save();
  const bob = Math.sin(time * 0.7 + hue) * 6;
  cy += bob;
  
  // Lock body
  ctx.beginPath();
  const bw = size * 0.5, bh = size * 0.4;
  ctx.roundRect(cx - bw / 2, cy, bw, bh, 6);
  
  const grad = ctx.createLinearGradient(cx - size, cy, cx + size, cy + size);
  const shift = (Math.sin(time * 0.25 + hue) + 1) / 2;
  grad.addColorStop(0, `rgba(${lerp(colors.purple, colors.warm, shift).join(',')},0.7)`);
  grad.addColorStop(1, `rgba(${lerp(colors.teal, colors.purple, shift).join(',')},0.5)`);
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(108,99,255,0.3)';
  ctx.shadowBlur = 20;
  ctx.fill();
  
  // Lock shackle
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.2, Math.PI, 0);
  ctx.strokeStyle = `rgba(${lerp(colors.purple, colors.teal, shift).join(',')},0.6)`;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();
  
  ctx.restore();
}

function drawFloatingGraph(cx, cy, size, time, hue) {
  ctx.save();
  const bob = Math.sin(time * 0.65 + hue) * 5;
  cy += bob;
  
  // Background circle
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.5);
  const shift = (Math.sin(time * 0.35 + hue) + 1) / 2;
  grad.addColorStop(0, `rgba(${lerp(colors.warm, colors.teal, shift).join(',')},0.5)`);
  grad.addColorStop(1, `rgba(${lerp(colors.teal, colors.warm, shift).join(',')},0.2)`);
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(220,160,100,0.2)';
  ctx.shadowBlur = 15;
  ctx.fill();
  
  // Upward trend line
  ctx.beginPath();
  ctx.moveTo(cx - size * 0.25, cy + size * 0.15);
  ctx.quadraticCurveTo(cx - size * 0.05, cy + size * 0.05, cx + size * 0.05, cy - size * 0.1);
  ctx.lineTo(cx + size * 0.2, cy - size * 0.2);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();
  
  ctx.restore();
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// Load Sora font then start
const link = document.createElement('link');
link.href = 'https://fonts.googleapis.com/css2?family=Sora:wght@800&family=Inter:wght@500&display=swap';
link.rel = 'stylesheet';
document.head.appendChild(link);
setTimeout(animate, 300);
</script>
</body>
</html>
