<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caelith</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block;position:fixed;inset:0}
.cursor{position:fixed;width:12px;height:12px;border:1.5px solid rgba(255,255,255,0.5);border-radius:50%;pointer-events:none;z-index:100;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;mix-blend-mode:difference}
.cursor.hover{width:48px;height:48px;border-color:rgba(78,205,196,0.8)}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<canvas id="c"></canvas>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ═══ SCENE ═══
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.4, 0.6, 0.2);
composer.addPass(bloom);

// ═══ ENV MAP ═══
const cubeRT = new THREE.WebGLCubeRenderTarget(512);
const cubeCamera = new THREE.CubeCamera(0.1, 10, cubeRT);
const envScene = new THREE.Scene();
const envMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  vertexShader: `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `
    varying vec3 vPos;
    void main(){
      vec3 n=normalize(vPos);
      float y=n.y;
      vec3 col=mix(vec3(0.0,0.0,0.02),vec3(0.02,0.01,0.06),smoothstep(-1.,1.,y));
      // Two hot spots for specular reflections
      float s1=pow(max(0.,dot(n,normalize(vec3(-0.5,0.8,0.3)))),64.);
      float s2=pow(max(0.,dot(n,normalize(vec3(0.7,0.3,-0.5)))),48.);
      col+=vec3(0.2,0.9,0.8)*s1*3.;
      col+=vec3(0.6,0.3,1.0)*s2*2.;
      gl_FragColor=vec4(col,1.);
    }`
});
envScene.add(new THREE.Mesh(new THREE.SphereGeometry(5,32,32), envMat));
cubeCamera.update(renderer, envScene);
scene.environment = cubeRT.texture;

// ═══ LIGHTS — minimal, dramatic ═══
scene.add(new THREE.AmbientLight(0x080820, 0.3));
const key = new THREE.SpotLight(0x4ecdc4, 80, 15, 0.5, 0.8);
key.position.set(-4, 5, 4);
scene.add(key);
const rim = new THREE.SpotLight(0xf7797d, 40, 12, 0.6, 0.9);
rim.position.set(3, 3, -5);
scene.add(rim);
const accent = new THREE.PointLight(0x6c63ff, 15, 8);
accent.position.set(2, -2, 3);
scene.add(accent);

// ═══ THE BLOB — inflated, balloony, NAP-style ═══
// Shield shape but inflated like a pillow/balloon
const shieldShape = new THREE.Shape();
shieldShape.moveTo(0, 1.4);
shieldShape.bezierCurveTo(0.7, 1.4, 1.1, 1.1, 1.1, 0.7);
shieldShape.lineTo(1.1, -0.1);
shieldShape.bezierCurveTo(1.1, -0.9, 0.35, -1.3, 0, -1.6);
shieldShape.bezierCurveTo(-0.35, -1.3, -1.1, -0.9, -1.1, -0.1);
shieldShape.lineTo(-1.1, 0.7);
shieldShape.bezierCurveTo(-1.1, 1.1, -0.7, 1.4, 0, 1.4);

const extSettings = {
  depth: 0.9,
  bevelEnabled: true,
  bevelThickness: 0.35,
  bevelSize: 0.3,
  bevelOffset: 0,
  bevelSegments: 16,
  curveSegments: 48
};
const shieldGeo = new THREE.ExtrudeGeometry(shieldShape, extSettings);
shieldGeo.center();
shieldGeo.computeVertexNormals();

// Inflate vertices — push outward for balloon effect
const posAttr = shieldGeo.attributes.position;
const normalAttr = shieldGeo.attributes.normal;
for (let i = 0; i < posAttr.count; i++) {
  const nx = normalAttr.getX(i);
  const ny = normalAttr.getY(i);
  const nz = normalAttr.getZ(i);
  const inflate = 0.08;
  posAttr.setX(i, posAttr.getX(i) + nx * inflate);
  posAttr.setY(i, posAttr.getY(i) + ny * inflate);
  posAttr.setZ(i, posAttr.getZ(i) + nz * inflate);
}
shieldGeo.computeVertexNormals();

const blobMat = new THREE.MeshPhysicalMaterial({
  color: 0x000000,
  metalness: 0.15,
  roughness: 0.02,
  transmission: 0.6,
  thickness: 3.0,
  ior: 1.8,
  clearcoat: 1.0,
  clearcoatRoughness: 0.0,
  iridescence: 1.0,
  iridescenceIOR: 2.2,
  iridescenceThicknessRange: [100, 800],
  sheen: 0.5,
  sheenColor: new THREE.Color(0x4ecdc4),
  sheenRoughness: 0.2,
  envMapIntensity: 4.0,
  specularIntensity: 2.0,
  specularColor: new THREE.Color(0xffffff),
  side: THREE.DoubleSide
});

const blob = new THREE.Mesh(shieldGeo, blobMat);
blob.scale.set(1.2, 1.2, 1.2);
scene.add(blob);

// ═══ INNER CHECKMARK — thick, balloony chrome tube ═══
const checkCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(-0.45, -0.05, 0.55),
  new THREE.Vector3(-0.3, -0.15, 0.55),
  new THREE.Vector3(-0.12, -0.42, 0.6),
  new THREE.Vector3(0.05, -0.15, 0.58),
  new THREE.Vector3(0.25, 0.2, 0.55),
  new THREE.Vector3(0.45, 0.45, 0.52)
], false, 'catmullrom', 0.5);

const checkGeo = new THREE.TubeGeometry(checkCurve, 48, 0.09, 16, false);
const checkMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.95,
  roughness: 0.0,
  clearcoat: 1.0,
  envMapIntensity: 5.0,
  iridescence: 0.4,
  iridescenceIOR: 1.5
});
const check = new THREE.Mesh(checkGeo, checkMat);
scene.add(check);

// ═══ FLOATING MINI BLOBS ═══
const miniBlobData = [
  { pos: [-2.8, 1.2, -1], size: 0.22, color: 0x4ecdc4 },
  { pos: [2.6, -0.8, -0.5], size: 0.18, color: 0x6c63ff },
  { pos: [-1.8, -1.5, 0.5], size: 0.14, color: 0xf7797d },
  { pos: [2.2, 1.5, -1.5], size: 0.16, color: 0x4ecdc4 },
  { pos: [0, 2.2, -1], size: 0.12, color: 0xdca064 },
];

const miniBlobs = miniBlobData.map((d, i) => {
  const geo = new THREE.SphereGeometry(d.size, 48, 48);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x000000,
    metalness: 0.1,
    roughness: 0.0,
    transmission: 0.7,
    thickness: 2.0,
    ior: 2.0,
    clearcoat: 1.0,
    iridescence: 1.0,
    iridescenceIOR: 2.2,
    iridescenceThicknessRange: [100 + i * 80, 600 + i * 50],
    sheen: 0.5,
    sheenColor: new THREE.Color(d.color),
    envMapIntensity: 4.0,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...d.pos);
  mesh.userData = { origin: new THREE.Vector3(...d.pos), speed: 0.3 + i * 0.15, phase: i * 1.3 };
  scene.add(mesh);
  return mesh;
});

// ═══ PARTICLES — sparse, elegant ═══
const pCount = 150;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
  pPos[i*3] = (Math.random()-0.5) * 18;
  pPos[i*3+1] = (Math.random()-0.5) * 12;
  pPos[i*3+2] = (Math.random()-0.5) * 8;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({ color: 0x4ecdc4, size: 0.015, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false });
scene.add(new THREE.Points(pGeo, pMat));

// ═══ MOUSE ═══
let tmx = 0, tmy = 0, mx = 0, my = 0;
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  tmx = (e.clientX / innerWidth - 0.5) * 2;
  tmy = (e.clientY / innerHeight - 0.5) * 2;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ═══ ANIMATE ═══
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  // Ultra-smooth mouse lerp
  mx += (tmx - mx) * 0.02;
  my += (tmy - my) * 0.02;
  
  // Blob — slow, weighty rotation like a real inflated object
  blob.rotation.y = mx * 0.35 + Math.sin(t * 0.2) * 0.08;
  blob.rotation.x = -my * 0.15 + Math.cos(t * 0.15) * 0.04;
  blob.rotation.z = Math.sin(t * 0.12) * 0.02;
  blob.position.y = Math.sin(t * 0.35) * 0.06;
  
  // Breathing scale — the "inflated" feel
  const breath = 1.2 + Math.sin(t * 0.8) * 0.015;
  blob.scale.set(breath, breath, breath);
  
  // Checkmark follows
  check.rotation.copy(blob.rotation);
  check.position.y = blob.position.y;
  check.scale.set(breath, breath, breath);
  
  // Mini blobs float organically
  miniBlobs.forEach(m => {
    const d = m.userData;
    m.position.x = d.origin.x + Math.sin(t * d.speed + d.phase) * 0.4;
    m.position.y = d.origin.y + Math.cos(t * d.speed * 0.7 + d.phase) * 0.35;
    m.position.z = d.origin.z + Math.sin(t * d.speed * 0.5 + d.phase * 2) * 0.3;
    // Gentle rotation
    m.rotation.y = t * d.speed * 0.5;
    // Breathing
    const s = 1 + Math.sin(t * 1.2 + d.phase) * 0.08;
    m.scale.set(s, s, s);
  });
  
  // Iridescence shift over time
  blobMat.iridescenceThicknessRange[0] = 100 + Math.sin(t * 0.3) * 80;
  blobMat.iridescenceThicknessRange[1] = 800 + Math.cos(t * 0.2) * 200;
  
  // Camera
  camera.position.x = mx * 0.6;
  camera.position.y = -my * 0.3;
  camera.lookAt(0, 0, 0);
  
  // Lights breathe
  key.intensity = 80 + Math.sin(t * 0.5) * 10;
  rim.intensity = 40 + Math.cos(t * 0.4) * 8;
  
  composer.render();
}

animate();
</script>
</body>
</html>
