<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direction 3 — Glass Object + Particles</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;font-family:'Inter',sans-serif;color:#fff}
canvas{display:block;position:fixed;inset:0}
.overlay{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.3);margin-bottom:20px}
h1{font-family:'Sora';font-size:clamp(36px,6vw,80px);font-weight:800;text-align:center;line-height:1.05;letter-spacing:-0.03em;max-width:700px;mix-blend-mode:difference}
h1 span{background:linear-gradient(135deg,#4ecdc4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:16px;color:rgba(255,255,255,0.35);margin-top:20px;text-align:center;max-width:450px;line-height:1.6}
.cta{margin-top:36px;display:flex;gap:12px;pointer-events:all}
.cta a{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:transform .3s cubic-bezier(.19,1,.22,1),box-shadow .3s}
.cta a.primary{background:linear-gradient(135deg,#4ecdc4,#44b3a8);color:#fff}
.cta a.primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(78,205,196,0.3)}
.cta a.secondary{border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6)}
.cta a.secondary:hover{border-color:rgba(255,255,255,0.25);transform:translateY(-2px)}
.label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;z-index:2}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="eyebrow">AIFMD II Compliance Platform</div>
  <h1>Fund compliance,<br><span>automated.</span></h1>
  <p class="sub">Every decision logged, verified, and cryptographically proven — before your regulator asks.</p>
  <div class="cta">
    <a href="#" class="primary">Try Live Demo →</a>
    <a href="#" class="secondary">View API Docs</a>
  </div>
</div>
<div class="label">Direction 3 — Glass Object + Particles · Move your mouse</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 5.5);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.2,0.5,0.15));

// Environment
const envScene=new THREE.Scene();
envScene.add(new THREE.Mesh(new THREE.SphereGeometry(5,32,32),new THREE.ShaderMaterial({
  side:THREE.BackSide,
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vP;void main(){vec3 n=normalize(vP);float y=n.y;vec3 c=mix(vec3(0,0,0.02),vec3(0.01,0,0.04),smoothstep(-1.,1.,y));float s=pow(max(0.,dot(n,normalize(vec3(-0.5,0.8,0.3)))),80.);c+=vec3(0.2,0.8,0.7)*s*2.;gl_FragColor=vec4(c,1.);}`
})));
const cubeRT=new THREE.WebGLCubeRenderTarget(256);
const cubeCamera=new THREE.CubeCamera(0.1,10,cubeRT);
cubeCamera.update(renderer,envScene);
scene.environment=cubeRT.texture;

// Lights
scene.add(new THREE.AmbientLight(0x0a0a20,0.3));
const key=new THREE.SpotLight(0x4ecdc4,60,12,0.5,0.8);
key.position.set(-3,4,3);scene.add(key);
const rim=new THREE.SpotLight(0xa78bfa,30,10,0.6,0.9);
rim.position.set(2,2,-4);scene.add(rim);

// Glass shield
const shape=new THREE.Shape();
shape.moveTo(0,1.3);
shape.bezierCurveTo(0.65,1.3,1.05,1.05,1.05,0.7);
shape.lineTo(1.05,-0.1);
shape.bezierCurveTo(1.05,-0.85,0.3,-1.2,0,-1.5);
shape.bezierCurveTo(-0.3,-1.2,-1.05,-0.85,-1.05,-0.1);
shape.lineTo(-1.05,0.7);
shape.bezierCurveTo(-1.05,1.05,-0.65,1.3,0,1.3);

const geo=new THREE.ExtrudeGeometry(shape,{depth:0.3,bevelEnabled:true,bevelThickness:0.06,bevelSize:0.05,bevelSegments:6,curveSegments:32});
geo.center();

const mat=new THREE.MeshPhysicalMaterial({
  color:0xffffff,metalness:0.0,roughness:0.0,
  transmission:0.95,thickness:0.8,ior:1.45,
  clearcoat:1.0,clearcoatRoughness:0.0,
  envMapIntensity:1.5,
  iridescence:0.3,iridescenceIOR:1.3,
  side:THREE.DoubleSide
});

const shield=new THREE.Mesh(geo,mat);
shield.scale.set(0.9,0.9,0.9);
scene.add(shield);

// Particles orbiting
const pCount=2000;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(pCount*3);
const pPhase=new Float32Array(pCount);
const pRadius=new Float32Array(pCount);
for(let i=0;i<pCount;i++){
  const theta=Math.random()*Math.PI*2;
  const phi=Math.acos(Math.random()*2-1);
  const r=1.5+Math.random()*2.5;
  pPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
  pPos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
  pPos[i*3+2]=r*Math.cos(phi);
  pPhase[i]=Math.random()*Math.PI*2;
  pRadius[i]=r;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({color:0x4ecdc4,size:0.012,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
const particles=new THREE.Points(pGeo,pMat);
scene.add(particles);

// Thin ring
const ringGeo=new THREE.TorusGeometry(1.6,0.008,8,128);
const ringMat=new THREE.MeshBasicMaterial({color:0x4ecdc4,transparent:true,opacity:0.15});
const ring=new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x=Math.PI*0.5;
scene.add(ring);

let tmx=0,tmy=0,mx=0,my=0;
document.addEventListener('mousemove',e=>{tmx=(e.clientX/innerWidth-0.5)*2;tmy=(e.clientY/innerHeight-0.5)*2;});
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  mx+=(tmx-mx)*0.02;my+=(tmy-my)*0.02;

  shield.rotation.y=mx*0.3+Math.sin(t*0.2)*0.08;
  shield.rotation.x=-my*0.15+Math.cos(t*0.15)*0.04;
  shield.position.y=Math.sin(t*0.4)*0.05;
  const b=0.9+Math.sin(t*0.8)*0.01;
  shield.scale.set(b,b,b);

  // Orbit particles
  const pos=pGeo.attributes.position.array;
  for(let i=0;i<pCount;i++){
    const ph=pPhase[i];
    const r=pRadius[i];
    const speed=0.15/r;
    const theta=t*speed+ph;
    const phi=ph+Math.sin(t*0.1+ph)*0.3;
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta)+Math.sin(t*0.3+ph)*0.1;
    pos[i*3+2]=r*Math.cos(phi);
  }
  pGeo.attributes.position.needsUpdate=true;
  
  ring.rotation.z=t*0.05;
  ring.material.opacity=0.1+Math.sin(t*0.5)*0.05;
  
  camera.position.x=mx*0.4;
  camera.position.y=-my*0.2;
  camera.lookAt(0,0,0);

  composer.render();
}
animate();
</script>
</body>
</html>
