<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direction 4 — Noise-Distorted Sphere</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;overflow:hidden;font-family:'Inter',sans-serif;color:#fff}
canvas{display:block;position:fixed;inset:0}
.overlay{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.3);margin-bottom:20px}
h1{font-family:'Sora';font-size:clamp(36px,6vw,80px);font-weight:800;text-align:center;line-height:1.05;letter-spacing:-0.03em;max-width:700px}
h1 span{background:linear-gradient(135deg,#4ecdc4,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:16px;color:rgba(255,255,255,0.35);margin-top:20px;text-align:center;max-width:450px;line-height:1.6}
.cta{margin-top:36px;display:flex;gap:12px;pointer-events:all}
.cta a{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:transform .3s cubic-bezier(.19,1,.22,1),box-shadow .3s}
.cta a.primary{background:linear-gradient(135deg,#4ecdc4,#44b3a8);color:#fff}
.cta a.primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(78,205,196,0.3)}
.cta a.secondary{border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6)}
.cta a.secondary:hover{border-color:rgba(255,255,255,0.25);transform:translateY(-2px)}
.label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;z-index:2}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="eyebrow">AIFMD II Compliance Platform</div>
  <h1>Fund compliance,<br><span>automated.</span></h1>
  <p class="sub">Every decision logged, verified, and cryptographically proven — before your regulator asks.</p>
  <div class="cta">
    <a href="#" class="primary">Try Live Demo →</a>
    <a href="#" class="secondary">View API Docs</a>
  </div>
</div>
<div class="label">Direction 4 — Noise-Distorted Sphere · Move your mouse</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 4.5);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.5,0.4,0.1));

// Env
const envScene=new THREE.Scene();
envScene.add(new THREE.Mesh(new THREE.SphereGeometry(5,32,32),new THREE.ShaderMaterial({
  side:THREE.BackSide,
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vP;void main(){vec3 n=normalize(vP);vec3 c=mix(vec3(0,0,0.015),vec3(0.02,0,0.05),n.y*0.5+0.5);float s1=pow(max(0.,dot(n,normalize(vec3(-0.5,0.7,0.3)))),60.);float s2=pow(max(0.,dot(n,normalize(vec3(0.6,0.2,-0.5)))),40.);c+=vec3(0.2,0.9,0.8)*s1*2.5;c+=vec3(0.8,0.3,0.9)*s2*1.5;gl_FragColor=vec4(c,1.);}`
})));
const cubeRT=new THREE.WebGLCubeRenderTarget(256);
const cc=new THREE.CubeCamera(0.1,10,cubeRT);
cc.update(renderer,envScene);
scene.environment=cubeRT.texture;

scene.add(new THREE.AmbientLight(0x0a0a20,0.2));
const key=new THREE.SpotLight(0x4ecdc4,50,10,0.5,0.8);key.position.set(-3,3,3);scene.add(key);
const rim=new THREE.SpotLight(0xf472b6,25,8,0.6,0.9);rim.position.set(2,1,-3);scene.add(rim);
const bot=new THREE.PointLight(0x6c63ff,10,6);bot.position.set(0,-2,2);scene.add(bot);

// Noise sphere with custom shader
const sphereGeo=new THREE.IcosahedronGeometry(1.2,128);

const noiseMat=new THREE.ShaderMaterial({
  uniforms:{
    uTime:{value:0},
    uMouse:{value:new THREE.Vector2(0,0)},
    uColor1:{value:new THREE.Color(0x4ecdc4)},
    uColor2:{value:new THREE.Color(0x6c63ff)},
    uColor3:{value:new THREE.Color(0xf472b6)},
    envMap:{value:cubeRT.texture}
  },
  vertexShader:`
    uniform float uTime;
    uniform vec2 uMouse;
    varying vec3 vNormal;
    varying vec3 vPosition;
    varying float vDisplacement;
    
    // Simplex noise
    vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
    float snoise(vec3 v){
      const vec2 C=vec2(1.0/6.0,1.0/3.0);
      const vec4 D=vec4(0.0,0.5,1.0,2.0);
      vec3 i=floor(v+dot(v,C.yyy));
      vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz);
      vec3 l=1.0-g;
      vec3 i1=min(g.xyz,l.zxy);
      vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx;
      vec3 x2=x0-i2+C.yyy;
      vec3 x3=x0-D.yyy;
      i=mod289(i);
      vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
      float n_=0.142857142857;
      vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.0*floor(p*ns.z*ns.z);
      vec4 x_=floor(j*ns.z);
      vec4 y_=floor(j-7.0*x_);
      vec4 x=x_*ns.x+ns.yyyy;
      vec4 y=y_*ns.x+ns.yyyy;
      vec4 h=1.0-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy);
      vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.0+1.0;
      vec4 s1=floor(b1)*2.0+1.0;
      vec4 sh=-step(h,vec4(0.0));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
      vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x);
      vec3 p1=vec3(a0.zw,h.y);
      vec3 p2=vec3(a1.xy,h.z);
      vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
      vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
      m=m*m;
      return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }
    
    void main(){
      float noise1=snoise(normal*1.5+uTime*0.15)*0.35;
      float noise2=snoise(normal*3.0+uTime*0.2)*0.15;
      float noise3=snoise(normal*6.0+uTime*0.3)*0.05;
      float displacement=noise1+noise2+noise3;
      
      // Mouse influence
      displacement+=smoothstep(1.0,0.0,length(normal.xy-uMouse*0.5))*0.15;
      
      vDisplacement=displacement;
      vec3 newPos=position+normal*displacement;
      vNormal=normalize(normalMatrix*normal);
      vPosition=newPos;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(newPos,1.0);
    }
  `,
  fragmentShader:`
    uniform vec3 uColor1;
    uniform vec3 uColor2;
    uniform vec3 uColor3;
    uniform float uTime;
    varying vec3 vNormal;
    varying vec3 vPosition;
    varying float vDisplacement;
    
    void main(){
      // Fresnel
      vec3 viewDir=normalize(cameraPosition-vPosition);
      float fresnel=pow(1.0-max(dot(viewDir,vNormal),0.0),3.0);
      
      // Color based on displacement + fresnel
      vec3 col=mix(uColor1,uColor2,vDisplacement*2.0+0.5);
      col=mix(col,uColor3,fresnel*0.7);
      
      // Specular
      vec3 lightDir=normalize(vec3(-1.0,1.0,1.0));
      float spec=pow(max(dot(reflect(-lightDir,vNormal),viewDir),0.0),32.0);
      col+=vec3(1.0)*spec*0.5;
      
      // Rim glow
      col+=uColor1*fresnel*0.6;
      
      // Iridescence fake
      float iri=sin(vDisplacement*10.0+uTime*0.5)*0.5+0.5;
      col=mix(col,mix(uColor2,uColor3,iri),fresnel*0.3);
      
      gl_FragColor=vec4(col,1.0);
    }
  `,
  side:THREE.FrontSide
});

const sphere=new THREE.Mesh(sphereGeo,noiseMat);
scene.add(sphere);

// Wireframe overlay
const wireGeo=new THREE.IcosahedronGeometry(1.2,16);
const wireMat=new THREE.MeshBasicMaterial({color:0x4ecdc4,wireframe:true,transparent:true,opacity:0.03});
const wire=new THREE.Mesh(wireGeo,wireMat);
scene.add(wire);

// Sparse particles
const pCount=300;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){
  pPos[i*3]=(Math.random()-0.5)*10;
  pPos[i*3+1]=(Math.random()-0.5)*7;
  pPos[i*3+2]=(Math.random()-0.5)*6;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x4ecdc4,size:0.01,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending,depthWrite:false})));

let tmx=0,tmy=0,mx=0,my=0;
document.addEventListener('mousemove',e=>{tmx=(e.clientX/innerWidth-0.5)*2;tmy=(e.clientY/innerHeight-0.5)*2;});
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  mx+=(tmx-mx)*0.02;my+=(tmy-my)*0.02;
  
  noiseMat.uniforms.uTime.value=t;
  noiseMat.uniforms.uMouse.value.set(mx,my);
  
  sphere.rotation.y=t*0.05+mx*0.2;
  sphere.rotation.x=Math.sin(t*0.1)*0.1-my*0.1;
  sphere.position.y=Math.sin(t*0.3)*0.05;
  
  wire.rotation.copy(sphere.rotation);
  wire.position.copy(sphere.position);
  
  camera.position.x=mx*0.3;
  camera.position.y=-my*0.2;
  camera.lookAt(0,0,0);
  
  composer.render();
}
animate();
</script>
</body>
</html>
