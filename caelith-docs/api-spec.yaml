openapi: 3.0.3
info:
  title: Caelith Compliance Platform API
  description: >
    AIFMD II compliance engine for EU alternative investment fund managers.
    All endpoints except /api/auth/* and /api/public/* require JWT authentication
    via Bearer token or access_token cookie.
  version: 0.1.0
  contact:
    name: Caelith Dev Team

servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://caelith-production.up.railway.app
    description: Production (Railway)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    Investor:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        jurisdiction: { type: string }
        accredited: { type: boolean }
        investor_type: { type: string, enum: [institutional, professional, semi_professional, well_informed, retail] }
        kyc_status: { type: string, enum: [pending, verified, expired, rejected] }
        kyc_expiry: { type: string, format: date, nullable: true }
        tax_id: { type: string, nullable: true }
        lei: { type: string, nullable: true }
        email: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Asset:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        asset_type: { type: string }
        total_units: { type: number }
        fund_structure_id: { type: string, format: uuid, nullable: true }
        unit_price: { type: number, nullable: true }

    FundStructure:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        legal_form: { type: string }
        domicile: { type: string }
        regulatory_framework: { type: string }
        status: { type: string }
        currency: { type: string }

    Holding:
      type: object
      properties:
        id: { type: string, format: uuid }
        investor_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        units: { type: number }
        acquired_at: { type: string, format: date }

    Transfer:
      type: object
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        from_investor_id: { type: string, format: uuid }
        to_investor_id: { type: string, format: uuid }
        units: { type: number }
        status: { type: string }
        executed_at: { type: string, format: date }

    DecisionRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        decision_type: { type: string }
        result: { type: string, enum: [approved, rejected, pending] }
        asset_id: { type: string, format: uuid, nullable: true }
        subject_id: { type: string, format: uuid }
        integrity_hash: { type: string, nullable: true }
        decided_at: { type: string, format: date-time }

  parameters:
    fundId:
      name: fundId
      in: path
      required: true
      schema: { type: string, format: uuid }

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: Auth
    description: Authentication & user management
  - name: Investors
    description: Investor CRUD, DSGVO export/erasure
  - name: Assets
    description: Asset management
  - name: Holdings
    description: Investor holdings & cap table
  - name: Transfers
    description: Transfer simulation, execution, approval
  - name: Fund Structures
    description: Fund structure management
  - name: Rules
    description: Compliance rule sets
  - name: Composite Rules
    description: Complex multi-condition rules
  - name: Decision Records
    description: Compliance decision audit trail with integrity chain
  - name: Eligibility
    description: Investor eligibility checks & criteria
  - name: Onboarding
    description: Investor onboarding workflow
  - name: Reports
    description: Compliance reports, Annex IV, audit packages, evidence bundles
  - name: Dashboard
    description: Dashboard overview data
  - name: Events
    description: System event log
  - name: Webhooks
    description: Webhook management
  - name: Templates
    description: Regulatory rule templates
  - name: Import
    description: Bulk JSON/CSV import
  - name: Regulatory
    description: RAG-based regulatory document queries
  - name: Copilot
    description: AI compliance copilot
  - name: Calendar
    description: Compliance calendar & alerts
  - name: Screening
    description: Investor sanctions screening
  - name: Readiness
    description: AIFMD II readiness assessment
  - name: LMT
    description: Liquidity Management Tools
  - name: Delegations
    description: Fund delegation management
  - name: Senior Persons
    description: Senior management persons (AIFMD II Art. 8)
  - name: Fee Disclosures
    description: Fund fee disclosures
  - name: Compliance Trend
    description: 30-day compliance score trend
  - name: Audit Trail
    description: Mutation audit log
  - name: Tenants
    description: Tenant management
  - name: Integrity
    description: Hash chain integrity verification
  - name: News
    description: Regulatory news feed
  - name: NL Rules
    description: Natural language rule compiler
  - name: Rule Packs
    description: Pre-configured regulatory rule packs
  - name: Scenarios
    description: What-if scenario analysis
  - name: Investor Documents
    description: KYC document upload & management
  - name: Regulatory Identifiers
    description: Per-fund regulatory IDs (LEI, ISIN, WKN)
  - name: LMT Notifications
    description: LMT activation notifications

paths:
  # ── Auth ──────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      security: []
      description: >
        Registration mode controlled by REGISTRATION_MODE env (open/invite/disabled).
        Role always defaults to 'viewer'.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
                inviteCode: { type: string, description: Required when REGISTRATION_MODE=invite }
      responses:
        '201':
          description: User created, JWT + refresh token returned (also set as cookies)
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  refreshToken: { type: string }
                  user: { type: object }
        '403': { description: Registration disabled or invalid invite code }
        '400': { description: Validation error }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: JWT + refresh token (also set as httpOnly cookies)
        '401': { description: Invalid credentials }

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string, description: Or sent via refresh_token cookie }
      responses:
        '200': { description: New token pair }
        '401': { description: Invalid/expired refresh token }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revokes refresh tokens)
      responses:
        '200': { description: Logged out }

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        '200': { description: Always returns success to prevent email enumeration }

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string }
      responses:
        '200': { description: Password reset }
        '400': { description: Invalid/expired token }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { type: object }

  # ── Investors ─────────────────────────────────────────
  /api/investors:
    get:
      tags: [Investors]
      summary: List all investors
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Investor' }
    post:
      tags: [Investors]
      summary: Create investor
      description: "Auth: admin, compliance_officer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, jurisdiction, accredited]
              properties:
                name: { type: string }
                jurisdiction: { type: string }
                accredited: { type: boolean }
                investor_type: { type: string, enum: [institutional, professional, semi_professional, well_informed, retail] }
                kyc_status: { type: string, enum: [pending, verified, expired, rejected] }
                kyc_expiry: { type: string, format: date }
                tax_id: { type: string }
                lei: { type: string }
                email: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Investor' }

  /api/investors/{id}:
    get:
      tags: [Investors]
      summary: Get investor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Investor' }
        '404': { description: Not found }
    patch:
      tags: [Investors]
      summary: Update investor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                jurisdiction: { type: string }
                accredited: { type: boolean }
                investor_type: { type: string }
                kyc_status: { type: string }
                kyc_expiry: { type: string }
                tax_id: { type: string }
                lei: { type: string }
                email: { type: string }
      responses:
        '200': { description: Updated investor }
    delete:
      tags: [Investors]
      summary: DSGVO Art. 17 erasure (soft-delete + PII anonymization)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Investor anonymized }

  /api/investors/{id}/export:
    get:
      tags: [Investors]
      summary: "DSGVO Art. 15/20: Full data export"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: format
          in: query
          schema: { type: string, enum: [json, csv], default: json }
      responses:
        '200': { description: Complete investor data package }

  # ── Assets ────────────────────────────────────────────
  /api/assets:
    get:
      tags: [Assets]
      summary: List all assets
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Asset' }
    post:
      tags: [Assets]
      summary: Create asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, asset_type, total_units]
              properties:
                name: { type: string }
                asset_type: { type: string }
                total_units: { type: number }
                fund_structure_id: { type: string, format: uuid }
                unit_price: { type: number }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }

  /api/assets/{id}:
    get:
      tags: [Assets]
      summary: Get asset by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }
    patch:
      tags: [Assets]
      summary: Update asset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated asset }
    delete:
      tags: [Assets]
      summary: Delete asset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /api/assets/{id}/utilization:
    get:
      tags: [Assets]
      summary: Get asset utilization stats
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Asset utilization data }

  # ── Holdings ──────────────────────────────────────────
  /api/holdings:
    get:
      tags: [Holdings]
      summary: Get holdings by assetId or investorId
      parameters:
        - name: assetId
          in: query
          schema: { type: string, format: uuid }
        - name: investorId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Array of holdings }
        '400': { description: Must provide assetId or investorId }
    post:
      tags: [Holdings]
      summary: Allocate holding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [investor_id, asset_id, units, acquired_at]
              properties:
                investor_id: { type: string, format: uuid }
                asset_id: { type: string, format: uuid }
                units: { type: number, minimum: 0, exclusiveMinimum: true }
                acquired_at: { type: string, format: date }
      responses:
        '201': { description: Holding created }

  /api/holdings/cap-table/{assetId}:
    get:
      tags: [Holdings]
      summary: Get cap table for asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Cap table data }

  /api/holdings/cap-table/{assetId}/pdf:
    get:
      tags: [Holdings]
      summary: Download cap table as PDF
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: PDF file
          content:
            application/pdf: {}

  # ── Transfers ─────────────────────────────────────────
  /api/transfers:
    get:
      tags: [Transfers]
      summary: List transfers (optionally by assetId)
      parameters:
        - name: assetId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Array of transfers }
    post:
      tags: [Transfers]
      summary: Execute transfer
      description: "Auth: admin, compliance_officer. Returns 202 if pending approval."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id, from_investor_id, to_investor_id, units, execution_date]
              properties:
                asset_id: { type: string, format: uuid }
                from_investor_id: { type: string, format: uuid }
                to_investor_id: { type: string, format: uuid }
                units: { type: number, minimum: 0, exclusiveMinimum: true }
                execution_date: { type: string, format: date }
      responses:
        '201': { description: Transfer executed }
        '202': { description: Transfer pending approval }

  /api/transfers/simulate:
    post:
      tags: [Transfers]
      summary: Simulate transfer (dry run)
      description: "Auth: admin, compliance_officer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id, from_investor_id, to_investor_id, units, execution_date]
              properties:
                asset_id: { type: string, format: uuid }
                from_investor_id: { type: string, format: uuid }
                to_investor_id: { type: string, format: uuid }
                units: { type: number }
                execution_date: { type: string, format: date }
      responses:
        '200': { description: Simulation result }

  /api/transfers/pending:
    get:
      tags: [Transfers]
      summary: List pending transfers
      description: "Auth: admin, compliance_officer"
      responses:
        '200': { description: Array of pending transfers }

  /api/transfers/{id}/approve:
    post:
      tags: [Transfers]
      summary: Approve pending transfer
      description: "Auth: admin, compliance_officer"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Transfer approved }

  /api/transfers/{id}/reject:
    post:
      tags: [Transfers]
      summary: Reject pending transfer
      description: "Auth: admin, compliance_officer"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200': { description: Transfer rejected }

  /api/transfers/history:
    get:
      tags: [Transfers]
      summary: Get transfer history
      parameters:
        - name: assetId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Transfer history }

  /api/transfers/history/{assetId}:
    get:
      tags: [Transfers]
      summary: Get transfer history for asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Transfer history }

  # ── Fund Structures ───────────────────────────────────
  /api/fund-structures:
    get:
      tags: [Fund Structures]
      summary: List all fund structures
      responses:
        '200': { description: Array of fund structures }
    post:
      tags: [Fund Structures]
      summary: Create fund structure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, legal_form, domicile, regulatory_framework]
              properties:
                name: { type: string }
                legal_form: { type: string }
                domicile: { type: string }
                regulatory_framework: { type: string }
                aifm_name: { type: string }
                aifm_lei: { type: string }
                inception_date: { type: string, format: date }
                target_size: { type: number }
                currency: { type: string }
                sfdr_classification: { type: string }
                status: { type: string }
                lmt_types: { type: array, items: { type: string } }
      responses:
        '201': { description: Fund created (may include AIFMD II warnings) }

  /api/fund-structures/{id}:
    get:
      tags: [Fund Structures]
      summary: Get fund structure by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Fund structure }
    patch:
      tags: [Fund Structures]
      summary: Update fund structure
      description: >
        Activation blocked if AIFMD II requirements not met
        (2 EU-resident senior persons, 2 LMTs for open-ended funds).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated }
        '422': { description: Business logic error (AIFMD II requirements) }
    delete:
      tags: [Fund Structures]
      summary: Delete fund structure
      description: Blocked if linked assets exist.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Deleted }
        '422': { description: Has linked assets }

  # ── Rules ─────────────────────────────────────────────
  /api/rules:
    post:
      tags: [Rules]
      summary: Create or update rule set for an asset
      description: "Auth: admin, compliance_officer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id, qualification_required, lockup_days, jurisdiction_whitelist]
              properties:
                asset_id: { type: string, format: uuid }
                qualification_required: { type: boolean }
                lockup_days: { type: integer }
                jurisdiction_whitelist: { type: array, items: { type: string } }
                transfer_whitelist: { type: array, items: { type: string }, nullable: true }
                investor_type_whitelist: { type: array, items: { type: string } }
                minimum_investment: { type: number }
                maximum_investors: { type: integer }
                concentration_limit_pct: { type: number }
                kyc_required: { type: boolean }
      responses:
        '201': { description: Rule set created/updated }

  /api/rules/{assetId}:
    get:
      tags: [Rules]
      summary: Get rule set for asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Rule set }

  /api/rules/{assetId}/versions:
    get:
      tags: [Rules]
      summary: Get rule version history
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Array of rule versions }

  # ── Composite Rules ───────────────────────────────────
  /api/composite-rules:
    get:
      tags: [Composite Rules]
      summary: List composite rules for an asset
      parameters:
        - name: assetId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Array of composite rules }
    post:
      tags: [Composite Rules]
      summary: Create composite rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset_id, name, operator, conditions]
              properties:
                asset_id: { type: string, format: uuid }
                name: { type: string }
                description: { type: string }
                operator: { type: string, enum: [AND, OR, NOT] }
                conditions: { type: array, items: { type: object } }
                enabled: { type: boolean }
      responses:
        '201': { description: Created }

  /api/composite-rules/{id}:
    patch:
      tags: [Composite Rules]
      summary: Update composite rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Composite Rules]
      summary: Delete composite rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Deleted }

  # ── Decision Records ──────────────────────────────────
  /api/decisions:
    get:
      tags: [Decision Records]
      summary: List decision records
      description: "Auth: admin"
      parameters:
        - name: decision_type
          in: query
          schema: { type: string }
        - name: result
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  decisions: { type: array, items: { $ref: '#/components/schemas/DecisionRecord' } }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }

  /api/decisions/verify-chain:
    get:
      tags: [Decision Records]
      summary: Verify integrity hash chain
      responses:
        '200': { description: Chain verification result }

  /api/decisions/seal-all:
    post:
      tags: [Decision Records]
      summary: Seal all unsealed decision records
      description: "Auth: admin only"
      responses:
        '200': { description: Count of sealed records }

  /api/decisions/asset/{assetId}:
    get:
      tags: [Decision Records]
      summary: Get decisions for asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
