  /api/funds/{fundId}/senior-persons:
    get:
      tags: [Senior Persons]
      summary: List senior persons for fund
      parameters:
        - $ref: '#/components/parameters/fundId'
      responses:
        '200': { description: Array of senior persons }
    post:
      tags: [Senior Persons]
      summary: Create senior person
      parameters:
        - $ref: '#/components/parameters/fundId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, role, jurisdiction]
              properties:
                full_name: { type: string }
                role: { type: string }
                jurisdiction: { type: string }
                eu_resident: { type: boolean }
                start_date: { type: string, format: date }
                notes: { type: string }
      responses:
        '201': { description: Created }

  /api/funds/{fundId}/senior-persons/{id}:
    patch:
      tags: [Senior Persons]
      summary: Update senior person
      parameters:
        - $ref: '#/components/parameters/fundId'
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Senior Persons]
      summary: Delete senior person
      parameters:
        - $ref: '#/components/parameters/fundId'
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Deleted }

  # ── Fee Disclosures ───────────────────────────────────
  /api/funds/{fundId}/fees:
    get:
      tags: [Fee Disclosures]
      summary: List fee disclosures for fund
      parameters:
        - $ref: '#/components/parameters/fundId'
      responses:
        '200': { description: Array of fees }
    post:
      tags: [Fee Disclosures]
      summary: Create fee disclosure
      parameters:
        - $ref: '#/components/parameters/fundId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fee_type, fee_label]
              properties:
                fee_type: { type: string }
                fee_label: { type: string }
                fee_recipient: { type: string }
                fee_rate_bps: { type: number }
                fee_fixed_amount_cents: { type: integer }
                fee_currency: { type: string }
                frequency: { type: string }
                disclosed_in_prospectus: { type: boolean }
                notes: { type: string }
      responses:
        '201': { description: Created }

  /api/funds/{fundId}/fees/{id}:
    patch:
      tags: [Fee Disclosures]
      summary: Update fee disclosure
      parameters:
        - $ref: '#/components/parameters/fundId'
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Fee Disclosures]
      summary: Delete fee disclosure
      parameters:
        - $ref: '#/components/parameters/fundId'
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Deleted }

  # ── Compliance Trend ──────────────────────────────────
  /api/compliance/trend:
    get:
      tags: [Compliance Trend]
      summary: 30-day compliance score trend
      responses:
        '200':
          description: Score snapshots + trend direction
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots: { type: array }
                  trend: { type: object }
                  synthetic: { type: boolean, description: True if data is generated }

  /api/compliance/snapshot:
    post:
      tags: [Compliance Trend]
      summary: Record today's compliance snapshot
      responses:
        '200': { description: Snapshot recorded }

  # ── Audit Trail ───────────────────────────────────────
  /api/audit-trail:
    get:
      tags: [Audit Trail]
      summary: Query audit log
      description: "Auth: admin"
      parameters:
        - name: entity_type
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string }
        - name: user_id
          in: query
          schema: { type: string }
        - name: start_date
          in: query
          schema: { type: string, format: date }
        - name: end_date
          in: query
          schema: { type: string, format: date }
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        '200': { description: Audit trail entries }

  # ── Tenants ───────────────────────────────────────────
  /api/tenants/current:
    get:
      tags: [Tenants]
      summary: Get current tenant info
      responses:
        '200': { description: Tenant details }

  /api/tenants:
    get:
      tags: [Tenants]
      summary: List all tenants
      description: "Auth: admin"
      responses:
        '200': { description: Array of tenants }

  # ── Integrity ─────────────────────────────────────────
  /api/public/integrity/verify:
    get:
      tags: [Integrity]
      summary: Public integrity chain verification
      security: []
      description: Rate limited to 10 req/min per IP.
      responses:
        '200':
          description: Chain verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  total_decisions_verified: { type: integer }
                  verification_algorithm: { type: string }

  /api/integrity/verify:
    get:
      tags: [Integrity]
      summary: Authenticated integrity verification (detailed)
      responses:
        '200':
          description: Chain verification with hash details

  # ── News ──────────────────────────────────────────────
  /api/news:
    get:
      tags: [News]
      summary: Regulatory news feed
      description: Aggregates RSS from BaFin, ESMA, ECB, EBA. Cached 30min.
      responses:
        '200':
          description: Filtered regulatory news articles

  # ── NL Rules ──────────────────────────────────────────
  /api/nl-rules/from-natural-language:
    post:
      tags: [NL Rules]
      summary: Compile natural language to compliance rule
      description: Requires ANTHROPIC_API_KEY env.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description, asset_id]
              properties:
                description: { type: string }
                asset_id: { type: string, format: uuid }
                context: { type: object }
      responses:
        '200': { description: Compiled rule }
        '503': { description: AI service not configured }

  # ── Rule Packs ────────────────────────────────────────
  /api/rule-packs:
    get:
      tags: [Rule Packs]
      summary: List available rule packs
      responses:
        '200': { description: Available AIFMD II rule packs }

  /api/rule-packs/apply:
    post:
      tags: [Rule Packs]
      summary: Apply rule pack to fund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fund_structure_id]
              properties:
                fund_structure_id: { type: string, format: uuid }
                legal_form: { type: string }
      responses:
        '201': { description: Rules applied }

  # ── Scenarios ─────────────────────────────────────────
  /api/scenarios/impact:
    post:
      tags: [Scenarios]
      summary: Analyze what-if scenario impact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fund_structure_id, proposed_changes]
              properties:
                fund_structure_id: { type: string, format: uuid }
                proposed_changes: { type: object }
      responses:
        '200': { description: Impact analysis }

  # ── Investor Documents ────────────────────────────────
  /api/investor-documents/{investorId}:
    get:
      tags: [Investor Documents]
      summary: List documents for investor
      parameters:
        - name: investorId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Array of documents }

  /api/investor-documents/{investorId}/upload:
    post:
      tags: [Investor Documents]
      summary: Upload KYC document
      description: Max 5MB. Accepts PDF, JPEG, PNG, TIFF, DOC, DOCX.
      parameters:
        - name: investorId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, document_type]
              properties:
                file: { type: string, format: binary }
                document_type: { type: string }
                expiry_date: { type: string, format: date }
                notes: { type: string }
      responses:
        '201': { description: Document uploaded }

  /api/investor-documents/file/{documentId}:
    get:
      tags: [Investor Documents]
      summary: Download document file
      parameters:
        - name: documentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Document file }
    delete:
      tags: [Investor Documents]
      summary: Delete document
      parameters:
        - name: documentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /api/investor-documents/file/{documentId}/verify:
    patch:
      tags: [Investor Documents]
      summary: Verify document
      parameters:
        - name: documentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Document verified }

  /api/investor-documents/file/{documentId}/reject:
    patch:
      tags: [Investor Documents]
      summary: Reject document
      parameters:
        - name: documentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Document rejected }

  # ── Regulatory Identifiers ───────────────────────────
  /api/funds/{fundId}/regulatory-identifiers:
    get:
      tags: [Regulatory Identifiers]
      summary: Get regulatory IDs for fund
      parameters:
        - $ref: '#/components/parameters/fundId'
      responses:
        '200': { description: Regulatory identifiers (LEI, ISIN, WKN, etc.) }
    put:
      tags: [Regulatory Identifiers]
      summary: Set/update regulatory IDs
      parameters:
        - $ref: '#/components/parameters/fundId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lei_code: { type: string }
                isin: { type: string }
                wkn: { type: string }
                bafin_id: { type: string }
                giin: { type: string }
                national_code: { type: string }
                mic: { type: string }
      responses:
        '200': { description: Updated identifiers }
