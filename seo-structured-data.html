<!-- 3. FAQPage -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What regulatory frameworks does Caelith cover?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AIFMD II, KAGB (including §1(19)), ELTIF 2.0, RAIF Law, SIF Law, and MiFID II provisions. 13 rules across 6 frameworks. Annex IV XML validated against ESMA XSD Rev 6 v1.2."
      }
    },
    {
      "@type": "Question",
      "name": "How does the BaFin filing agent work?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The BaFin Filing Agent reads your fund data, maps it to the ESMA Annex IV taxonomy (147 fields), generates XSD-validated XML, authenticates with BaFin's MVP Portal, uploads the filing, and captures a confirmation receipt with a SHA-256 audit hash. The entire process runs autonomously overnight."
      }
    },
    {
      "@type": "Question",
      "name": "Is the Annex IV XML ESMA-validated?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, every XML file is validated against ESMA's official Annex IV XSD schema (Rev 6, AIFMD_DATMAN_V1.2.xsd) before submission. Zero-tolerance validation — if any error is detected, the filing is paused and you're notified immediately."
      }
    },
    {
      "@type": "Question",
      "name": "Where is my data stored?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "All data is processed and stored on EU-hosted infrastructure (Railway Amsterdam, eu-west region). GDPR-compliant by design — no data leaves the European Union. We provide a Data Processing Agreement (DPA) to every customer."
      }
    },
    {
      "@type": "Question",
      "name": "How much does Caelith cost compared to manual compliance?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Caelith starts at €990/month for up to 3 funds — 93% cheaper than the average €150-200K/year spent on compliance consulting with Big 4 firms. The Professional plan at €1,990/month includes 15 funds, unlimited investors, and full agent access."
      }
    }
  ]
}
</script>
